name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ────────────────────────────────────────────────────────────
  # Fast core-library unit tests before committing to full build
  # ────────────────────────────────────────────────────────────
  test:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run core tests
        run: cargo test -p trail-inspector-core

  # ────────────────────────────────────────────────────────────
  # Cross-platform Tauri bundles
  # ────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Rust ──────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # ── Node.js ───────────────────────────────────────────
      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      # ── Linux system dependencies (Tauri/WebKit) ──────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Frontend ──────────────────────────────────────────
      # --legacy-peer-deps: @tailwindcss/vite@4 declares peer vite@"^5||^6||^7"
      # but this project uses vite@8 (works at runtime, just a peer dep declaration lag)
      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: ui
        run: npm run build

      # ── Tauri bundle ──────────────────────────────────────
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app (Windows — NSIS standalone EXE)
        if: matrix.platform == 'windows'
        working-directory: crates/app
        run: cargo tauri build --bundles nsis

      - name: Build Tauri app (Linux / macOS)
        if: matrix.platform != 'windows'
        working-directory: crates/app
        run: cargo tauri build

      # ── Upload artifacts for release job ──────────────────
      - name: Upload Windows standalone EXE
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: TrailInspector-windows
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Linux .deb package
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: TrailInspector-linux-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: TrailInspector-linux-appimage
          path: target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload macOS .dmg
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: TrailInspector-macos
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────
  # Publish GitHub Release with all binaries + RELEASE.md notes
  # ────────────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE.md
          fail_on_unmatched_files: true
          files: |
            artifacts/TrailInspector-windows/*.exe
            artifacts/TrailInspector-linux-deb/*.deb
            artifacts/TrailInspector-linux-appimage/*.AppImage
            artifacts/TrailInspector-macos/*.dmg
